name: Keep Supabase Database Active

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 min
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Keep-Alive Endpoint
        env:
          VERCEL_URL: ${{ secrets.VERCEL_DEPLOYMENT_URL }}
        run: |
          CLEAN_VERCEL_URL="${VERCEL_URL%/}"
          KEEP_ALIVE_URL="${CLEAN_VERCEL_URL}/api/keep-alive"
          echo "🚀 Pinging keep-alive endpoint: $KEEP_ALIVE_URL"
          echo "⏰ Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          response=$(curl -sL -w "\n%{http_code}" "$KEEP_ALIVE_URL" --max-time 30)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "📊 HTTP Status Code: $http_code"
          echo "📝 Response: $body"
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Keep-alive successful! Database is active."
            exit 0
          else
            echo "❌ Keep-alive failed with status code: $http_code"
            exit 1
          fi

      - name: Notify Teams on Success
        if: success()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          LOGO_URL="https://kbsearthmovers.vercel.app/Logo%20for%20KBS%20Earthmovers%20-%20Bold%20Industrial%20Design.png"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          payload=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Supabase keep-alive success",
            "themeColor": "2EB886",
            "title": "Supabase Keep-Alive Notification",
            "sections": [
              {
                "activityTitle": "${{ github.event.repository.name }}",
                "activitySubtitle": "Keep-alive workflow result",
                "activityImage": "${LOGO_URL}",
                "facts": [
                  { "name": "Project Name", "value": "${{ github.event.repository.name }}" },
                  { "name": "Job Status", "value": "Success ✅" },
                  { "name": "Timestamp", "value": "$(date -u +"%Y-%m-%d %H:%M:%S UTC")" },
                  { "name": "Action", "value": "${{ github.workflow }}" },
                  { "name": "Job Number", "value": "#${{ github.run_number }}" }
                ],
                "markdown": true
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "Open GitHub Run",
                "targets": [{ "os": "default", "uri": "${RUN_URL}" }]
              }
            ]
          }
          EOF
          )
          curl -sS -X POST "$TEAMS_WEBHOOK_URL" -H "Content-Type: application/json" -d "$payload"

      - name: Notify Teams on Failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          LOGO_URL="https://kbsearthmovers.vercel.app/Logo%20for%20KBS%20Earthmovers%20-%20Bold%20Industrial%20Design.png"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          payload=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Supabase keep-alive failure",
            "themeColor": "E81123",
            "title": "Supabase Keep-Alive Notification",
            "sections": [
              {
                "activityTitle": "${{ github.event.repository.name }}",
                "activitySubtitle": "Keep-alive workflow result",
                "activityImage": "${LOGO_URL}",
                "facts": [
                  { "name": "Project Name", "value": "${{ github.event.repository.name }}" },
                  { "name": "Job Status", "value": "Failed ❌" },
                  { "name": "Timestamp", "value": "$(date -u +"%Y-%m-%d %H:%M:%S UTC")" },
                  { "name": "Action", "value": "${{ github.workflow }}" },
                  { "name": "Job Number", "value": "#${{ github.run_number }}" }
                ],
                "markdown": true
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "Open GitHub Run",
                "targets": [{ "os": "default", "uri": "${RUN_URL}" }]
              }
            ]
          }
          EOF
          )
          curl -sS -X POST "$TEAMS_WEBHOOK_URL" -H "Content-Type: application/json" -d "$payload"
