<!DOCTYPE html>
<html>
<head>
  <title>Notification Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 15px 30px; margin: 10px; font-size: 16px; }
    .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>🔔 Notification Diagnostic Tool</h1>
  
  <button onclick="checkSupport()">1. Check Support</button>
  <button onclick="requestPermission()">2. Request Permission</button>
  <button onclick="registerSW()">3. Register Service Worker</button>
  <button onclick="testNotification()">4. Test Local Notification</button>
  
  <div id="logs"></div>
  
  <script>
    function log(message, type = 'info') {
      const logs = document.getElementById('logs');
      const div = document.createElement('div');
      div.className = 'log ' + type;
      div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
      logs.insertBefore(div, logs.firstChild);
      console.log(message);
    }
    
    function checkSupport() {
      log('Checking support...');
      log('Service Worker: ' + ('serviceWorker' in navigator ? '✅' : '❌'), 
          'serviceWorker' in navigator ? 'success' : 'error');
      log('Notifications: ' + ('Notification' in window ? '✅' : '❌'),
          'Notification' in window ? 'success' : 'error');
      log('Push Manager: ' + ('PushManager' in window ? '✅' : '❌'),
          'PushManager' in window ? 'success' : 'error');
      log('Current permission: ' + Notification.permission);
    }
    
    async function requestPermission() {
      log('Requesting permission...');
      const permission = await Notification.requestPermission();
      log('Permission result: ' + permission, permission === 'granted' ? 'success' : 'error');
    }
    
    async function registerSW() {
      try {
        log('Registering service worker...');
        const registration = await navigator.serviceWorker.register('/sw.js');
        log('✅ Service worker registered: ' + registration.scope, 'success');
        
        await navigator.serviceWorker.ready;
        log('✅ Service worker ready', 'success');
      } catch (error) {
        log('❌ Error: ' + error.message, 'error');
      }
    }
    
    function testNotification() {
      if (Notification.permission === 'granted') {
        new Notification('Test Notification', {
          body: 'This is a test notification!',
          icon: '/icons/icon-192x192.png'
        });
        log('✅ Test notification sent', 'success');
      } else {
        log('❌ Permission not granted', 'error');
      }
    }
  </script>
</body>
</html>
